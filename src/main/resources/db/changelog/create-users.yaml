databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: postgres
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: surname
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: birth_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_users_role

        - createIndex:
            tableName: users
            indexName: idx_users_role_id
            columns:
              - column:
                  name: role_id

        - createIndex:
            tableName: users
            indexName: idx_users_birth_date
            columns:
              - column:
                  name: birth_date