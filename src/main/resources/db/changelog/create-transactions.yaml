databaseChangeLog:
  - changeSet:
      id: create-transactions-table
      author: postgres
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: from_card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: to_card_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(15)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: from_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_from_card

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: to_card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_transactions_to_card

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_from_card_id
            columns:
              - column:
                  name: from_card_id

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_to_card_id
            columns:
              - column:
                  name: to_card_id

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: transactions
            indexName: idx_transactions_created_at
            columns:
              - column:
                  name: created_at